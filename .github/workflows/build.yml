name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit release version (e.g. v0.5.0). Used only when version_mode=explicit."
        required: false
        default: ""
      version_mode:
        description: "How to determine the release version"
        type: choice
        options:
          - auto-minor
          - explicit
        default: auto-minor
      release_channel:
        description: "Publish as prerelease or latest"
        type: choice
        options:
          - prerelease
          - latest
        default: prerelease
      dry_run:
        description: "Dry run — build only, skip release"
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux Qt runtime deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libopengl0 libxkbcommon-x11-0 libxcb-cursor0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"

      - name: Basedpyright
        run: python -m basedpyright -p .

      - name: QML diagnostics
        run: python scripts/diagnostics.py summary --tool qml --oneline

      - name: Runtime tests
        run: pytest src/tests/runtime -q

      - name: Launch smoke
        run: python scripts/launch_smoke.py

  build:
    needs: validate
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: TinyUi-windows
          - os: ubuntu-latest
            artifact: TinyUi-linux

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux Qt runtime deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libopengl0 libxkbcommon-x11-0 libxcb-cursor0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"

      - name: Build
        run: python scripts/build.py

      - name: Packaged smoke
        run: python scripts/packaged_smoke.py

      - name: Zip artifact
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "../${{ matrix.artifact }}.zip" TinyUi/
          else
            zip -r "../${{ matrix.artifact }}.zip" TinyUi/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    if: github.event_name == 'push' || github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION_MODE="${{ github.event.inputs.version_mode }}"
            EXPLICIT_VERSION="${{ github.event.inputs.version }}"

            git fetch --tags --force

            latest_tag=$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)

            if [ "$VERSION_MODE" = "explicit" ]; then
              if [ -z "$EXPLICIT_VERSION" ]; then
                echo "Explicit version is required when version_mode=explicit" >&2
                exit 1
              fi
              if [[ "$EXPLICIT_VERSION" != v* ]]; then
                EXPLICIT_VERSION="v$EXPLICIT_VERSION"
              fi
              echo "name=$EXPLICIT_VERSION" >> $GITHUB_OUTPUT
            else
              if [ -z "$latest_tag" ]; then
                next_tag="v0.1.0"
              else
                version="${latest_tag#v}"
                IFS='.' read -r major minor patch <<< "$version"
                next_tag="v${major}.$((minor + 1)).0"
              fi
              echo "name=$next_tag" >> $GITHUB_OUTPUT
            fi
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create or update tag (manual run only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ steps.tag.outputs.name }}
          git push origin ${{ steps.tag.outputs.name }} --force

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.tag.outputs.name }}"
          VERSION="${VERSION#v}"  # strip leading v
          # Extract the block between this version header and the next
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" docs/CHANGELOG.md)
          # Write to file to preserve newlines
          echo "$NOTES" > release_notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_channel == 'prerelease' || github.event_name != 'workflow_dispatch' }}
          make_latest: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_channel == 'latest' && 'true' || 'false' }}
          body_path: release_notes.md
          files: |
            TinyUi-windows/TinyUi-windows.zip
            TinyUi-linux/TinyUi-linux.zip
