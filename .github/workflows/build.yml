name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit release version (e.g. v0.5.0). Used only when version_mode=explicit."
        required: false
        default: ""
      version_mode:
        description: "How to determine the release version"
        type: choice
        options:
          - auto-patch
          - auto-minor
          - auto-major
          - explicit
        default: auto-minor
      release_channel:
        description: "Publish as prerelease or latest"
        type: choice
        options:
          - prerelease
          - latest
        default: prerelease
      dry_run:
        description: "Dry run — build only, skip release"
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  validate:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux Qt runtime deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libopengl0 libxkbcommon-x11-0 libxcb-cursor0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"

      - name: Basedpyright
        run: python -m basedpyright -p .

      - name: QML diagnostics
        run: python scripts/diagnostics.py summary --tool qml --oneline

      - name: Runtime tests
        run: pytest src/tests/runtime -q

      - name: Launch smoke
        run: python scripts/launch_smoke.py

  release_meta:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_version: ${{ steps.meta.outputs.release_version }}
      windows_zip: ${{ steps.meta.outputs.windows_zip }}
      linux_zip: ${{ steps.meta.outputs.linux_zip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION_MODE="${{ github.event.inputs.version_mode }}"
            EXPLICIT_VERSION="${{ github.event.inputs.version }}"

            git fetch --tags --force

            latest_tag=$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)

            if [ "$VERSION_MODE" = "explicit" ]; then
              if [ -z "$EXPLICIT_VERSION" ]; then
                echo "Explicit version is required when version_mode=explicit" >&2
                exit 1
              fi
              if [[ "$EXPLICIT_VERSION" != v* ]]; then
                EXPLICIT_VERSION="v$EXPLICIT_VERSION"
              fi
              tag_name="$EXPLICIT_VERSION"
            elif [ "$VERSION_MODE" = "auto-minor" ] || [ "$VERSION_MODE" = "auto-patch" ] || [ "$VERSION_MODE" = "auto-major" ]; then
              if [ -z "$latest_tag" ]; then
                tag_name="v0.1.0"
              else
                version="${latest_tag#v}"
                IFS='.' read -r major minor patch <<< "$version"
                if [ "$VERSION_MODE" = "auto-patch" ]; then
                  tag_name="v${major}.${minor}.$((patch + 1))"
                elif [ "$VERSION_MODE" = "auto-major" ]; then
                  tag_name="v$((major + 1)).0.0"
                else
                  tag_name="v${major}.$((minor + 1)).0"
                fi
              fi
            else
              echo "Unsupported version_mode: $VERSION_MODE" >&2
              exit 1
            fi
          else
            tag_name="${GITHUB_REF#refs/tags/}"
          fi

          echo "tag_name=$tag_name" >> $GITHUB_OUTPUT
          echo "release_version=${tag_name#v}" >> $GITHUB_OUTPUT
          echo "windows_zip=TinyUi-${tag_name}-windows.zip" >> $GITHUB_OUTPUT
          echo "linux_zip=TinyUi-${tag_name}-linux.zip" >> $GITHUB_OUTPUT

  build:
    needs: [validate, release_meta]
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: TinyUi-windows
          - os: ubuntu-latest
            artifact: TinyUi-linux

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux Qt runtime deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libopengl0 libxkbcommon-x11-0 libxcb-cursor0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Inject release version into build metadata
        env:
          RELEASE_VERSION: ${{ needs.release_meta.outputs.release_version }}
        run: |
          python -c "from pathlib import Path; import os, re; version = os.environ['RELEASE_VERSION']; files = [Path('pyproject.toml'), Path('src/plugins/tinyui/manifest.toml')]; patterns = [(re.compile(r'^(version\\s*=\\s*\")[^\"]+(\")', re.MULTILINE), r'\\g<1>' + version + r'\\2')]; [path.write_text(pattern.sub(repl, path.read_text(encoding='utf-8')), encoding='utf-8') for path in files for pattern, repl in patterns]"

      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"

      - name: Build
        run: python scripts/build.py

      - name: Packaged smoke
        run: python scripts/packaged_smoke.py

      - name: Zip artifact
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            ZIP_NAME="${{ needs.release_meta.outputs.windows_zip }}"
            7z a "../${ZIP_NAME}" TinyUi/
          else
            ZIP_NAME="${{ needs.release_meta.outputs.linux_zip }}"
            zip -r "../${ZIP_NAME}" TinyUi/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.os == 'windows-latest' && needs.release_meta.outputs.windows_zip || needs.release_meta.outputs.linux_zip }}

  release:
    needs: [build, release_meta]
    if: github.event_name == 'push' || github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create or update tag (manual run only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ needs.release_meta.outputs.tag_name }}
          git push origin ${{ needs.release_meta.outputs.tag_name }} --force

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          VERSION="${{ needs.release_meta.outputs.tag_name }}"
          VERSION="${VERSION#v}"  # strip leading v
          # Extract the block between this version header and the next
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" docs/CHANGELOG.md)
          # Write to file to preserve newlines
          echo "$NOTES" > release_notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release_meta.outputs.tag_name }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_channel == 'prerelease' || github.event_name != 'workflow_dispatch' }}
          make_latest: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_channel == 'latest' && 'true' || 'false' }}
          body_path: release_notes.md
          files: |
            TinyUi-windows/${{ needs.release_meta.outputs.windows_zip }}
            TinyUi-linux/${{ needs.release_meta.outputs.linux_zip }}
