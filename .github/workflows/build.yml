name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"
      dry_run:
        description: "Dry run — build only, skip release"
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: TinyUi-windows
          - os: ubuntu-latest
            artifact: TinyUi-linux

    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build
        run: python scripts/build.py

      - name: Zip artifact
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "../${{ matrix.artifact }}.zip" TinyUi/
          else
            zip -r "../${{ matrix.artifact }}.zip" TinyUi/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    if: github.event_name == 'push' || github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create or update tag (manual run only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ steps.tag.outputs.name }}
          git push origin ${{ steps.tag.outputs.name }} --force

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.tag.outputs.name }}"
          VERSION="${VERSION#v}"  # strip leading v
          # Extract the block between this version header and the next
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" docs/CHANGELOG.md)
          # Write to file to preserve newlines
          echo "$NOTES" > release_notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          prerelease: true
          body_path: release_notes.md
          files: |
            TinyUi-windows/TinyUi-windows.zip
            TinyUi-linux/TinyUi-linux.zip
