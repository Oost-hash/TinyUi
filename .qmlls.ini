# Settings for the QML language server (`qmlls`) used by Zed.
# Keep this in the workspace root because `qmlls` looks for `.qmlls.ini` there.
[General]

[Warnings]
# Keep qmlls focused on actionable QML issues. PySide's generated type
# information still produces several known false positives in the editor.
MissingProperty=disable
UnresolvedType=disable
StalePropertyRead=disable
Unqualified=disable
