[project]
name = "tinyui"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "PySide6>=6.8",
    "psutil>=6.1",
]

[project.scripts]
tinyui = "tinyui.main:run"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pyinstaller>=6.0",
]

[tool.pytest.ini_options]
testpaths = ["src/tinyui/tests"]
pythonpath = ["src"]
