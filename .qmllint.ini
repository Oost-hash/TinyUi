# Settings for `scripts/qmllint.py` / `pyside6-qmllint`.
# Keep this in the workspace root so the CLI tooling finds it automatically.
[General]

[Warnings]
# PySide metaobjectdump is still limited for several runtime-exposed properties
# and QVariantList-like data structures, so keep lint focused on actionable QML.
MissingProperty=disable
UnresolvedType=disable
StalePropertyRead=disable
Unqualified=disable
