[plugin]
id          = "tinyui"
type        = "host"
version     = "0.5.0"
author      = "Oost-hash"
url         = "https://github.com/Oost-hash/TinyUi"
sponsor     = "https://github.com/sponsors/oost-hash"
description = "TinyUI host plugin — the application framework"
icon        = "assets/images/logo/logo.png"

[[window]]
id      = "tinyui.main"
title   = "TinyUI"

menu = [
    { label = "Plugins", action = "open:pluginsPanel.main" },
    { label = "Settings", action = "open:settings.main" },
    { label = "DevTools", action = "open:devtools.main" },
    { separator = true },
    { label = "Close", action = "close" },
]

[[window.statusbar]]
text = "Widgets"
side = "left"
action = "widgetVisibility.toggle"

[window.chrome]
show_menu_button     = true
show_tab_bar         = true
show_status_bar      = true
custom_chrome        = "app_hostChrome/qml/HostChromeShell.qml"

[[tab]]
id = "tinyui.widgets"
label = "Widgets"
target = "tinyui.main"
surface = "app_widgetsTab/qml/surface.qml"

[[window]]
id      = "settings.main"
title   = "Settings"
surface = "app_settings/qml/surface.qml"

[[window]]
id       = "devtools.main"
title    = "DevTools"
surface  = "app_devtools/qml/surface.qml"

[[window]]
id          = "pluginsPanel.main"
title       = "Plugins"
surface     = "app_pluginsPanel/qml/surface.qml"

[[image]]
id   = "ui.menu"
path = "assets/images/ui/menu.svg"

[[image]]
id   = "ui.menu-open"
path = "assets/images/ui/menu-open.svg"

[[image]]
id   = "ui.window-minimize"
path = "assets/images/ui/window-minimize.svg"

[[image]]
id   = "ui.window-maximize"
path = "assets/images/ui/window-maximize.svg"

[[image]]
id   = "ui.window-restore"
path = "assets/images/ui/window-restore.svg"

[[image]]
id   = "ui.window-close"
path = "assets/images/ui/window-close.svg"

[[image]]
id   = "ui.caret-down"
path = "assets/images/ui/caret-down.svg"

[[image]]
id   = "ui.cog"
path = "assets/images/ui/cog.svg"

[[image]]
id   = "ui.play"
path = "assets/images/ui/play.svg"

[[image]]
id   = "ui.stop"
path = "assets/images/ui/stop.svg"

[[image]]
id   = "logo.github"
path = "assets/images/logo/ui/github.svg"

[[image]]
id   = "logo.heart"
path = "assets/images/logo/ui/heart.svg"

[[setting]]
key     = "theme"
label   = "Theme"
default = "dark"
type    = "choice"
choices = ["dark", "light"]

[[setting]]
key     = "save_location"
label   = "Save location"
default = ""
type    = "str"

[[setting]]
key     = "plugin_folder"
label   = "Plugin folder"
default = ""
type    = "str"

[[setting]]
key     = "connector_poll_interval_ms"
label   = "Connector poll interval (ms)"
default = 20
type    = "int"
