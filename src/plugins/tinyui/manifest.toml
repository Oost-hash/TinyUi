[plugin]
id          = "tinyui"
type        = "host"
version     = "0.5.0"
author      = "Oost-hash"
description = "TinyUI host plugin — the application framework"

[[window]]
id      = "tinyui.main"
title   = "TinyUI"
window_type = "main"

menu = [
    { label = "Plugins", action = "open:pluginsPanel.main" },
    { label = "Settings", action = "open:settings.main" },
    { label = "DevTools", action = "open:devtools.main" },
    { separator = true },
    { label = "Close", action = "close" },
]

[window.chrome]
show_menu_button     = true
show_tab_bar         = true
show_status_bar      = true
custom_chrome        = "app_hostChrome/qml/HostChromeShell.qml"

[[tab]]
id = "tinyui.widgets"
label = "Widgets"
target = "tinyui.main"
surface = "app_widgetsTab/qml/surface.qml"

[[window]]
id      = "settings.main"
title   = "Settings"
window_type = "dialog"
surface = "app_settings/qml/surface.qml"

[[window]]
id       = "devtools.main"
title    = "DevTools"
window_type = "dialog"
surface  = "app_devtools/qml/surface.qml"
requires = ["inspector"]

[[window]]
id          = "pluginsPanel.main"
title       = "Plugins"
window_type = "dialog"
surface     = "app_pluginsPanel/qml/surface.qml"
requires    = ["inspector"]

[[setting]]
key     = "theme"
label   = "Theme"
default = "dark"
type    = "choice"
choices = ["dark", "light"]

[[setting]]
key     = "save_location"
label   = "Save location"
default = ""
type    = "str"

[[setting]]
key     = "plugin_folder"
label   = "Plugin folder"
default = ""
type    = "str"
