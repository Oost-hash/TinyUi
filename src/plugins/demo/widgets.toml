# Demo plugin — widget definitions
# Each section defines one overlay widget.

[fuel]
title       = "Fuel"
description = "Remaining fuel with low-fuel warning"
enable      = true
source      = "vehicle.fuel"
format      = "{:.1f}"
label       = "FUEL"
x           = 100
y           = 100
flash_below = 2.0

[[fuel.thresholds]]
value = 0.0
color = "#FF4444"   # red — critical (< 2 L)

[[fuel.thresholds]]
value = 2.0
color = "#FF8C00"   # orange — low (2–5 L)

[[fuel.thresholds]]
value = 5.0
color = "#E0E0E0"   # white — normal (>= 5 L)
