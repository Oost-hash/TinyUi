[plugin]
id   = "dummy_plugin"
type = "plugin"

[[window]]
id      = "tinyui.main"
title   = "TinyUI"
window_type = "main"
surface = "qml/surface.qml"

[window.chrome]
show_menu_button     = true
show_caption_buttons = true

[[window]]
id      = "dummy.dialog"
title   = "Dummy Dialog"
window_type = "dialog"
surface = "qml/surface.qml"

[window.chrome]
show_menu_button     = false
show_caption_buttons = true

[[menu]]
window = "tinyui.main"
label  = "Dummy Dialog"
action = "open:dummy.dialog"
