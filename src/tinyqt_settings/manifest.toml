[[app]]
app_id = "tinyqt_settings.window"
title = "Settings"

[app.shell]
use_window_menu_bar = false
use_tab_bar = false
use_status_bar = false
lazy_panel_loading = true

[app.window]
window_kind = "tool"
presentation = "native"
restore_state_scope = "TinyUI.Settings"
eyebrow = "SETTINGS"
subtitle = "Review host and plugin settings in one place and apply changes when you are ready."
default_width = 960
default_height = 620
min_width = 680
min_height = 420

[[app.buttons]]
button_id = "revert"
label = "Revert"
role = "secondary"

[[app.buttons]]
button_id = "save"
label = "Save"
role = "primary"

[[app.buttons]]
button_id = "close"
label = "Close"
role = "secondary"
