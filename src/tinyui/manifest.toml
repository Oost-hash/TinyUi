[[app]]
app_id = "tinyui.main"
title = "TinyUi"
root_qml = "tinyqt_app/TinyUiMain.qml"
optional_features = ["devtools_ui"]

[app.shell]
use_window_menu_bar = true
use_tab_bar = true
use_status_bar = true
lazy_panel_loading = true

[app.chrome]
show_menu_button = true
show_title_text = true
show_caption_buttons = true
show_status_left_items = true
show_status_plugin_picker = true

[app.window]
window_kind = "main"
presentation = "qml"
restore_state_scope = "TinyUI"

[[app.menu_items]]
label = "Settings"
action = "settings"

[[app.menu_items]]
label = "Dev Tools"
action = "devtools"
requires_feature = "devtools_ui"

[[app.menu_items]]
label = ""
separator = true

[[app.menu_items]]
label = "Close"
action = "close"

[[app.panels]]
panel_id = "widgets"
label = "Widgets"
qml_type = "WidgetTab"
package = "TinyUI"

[[app]]
app_id = "tinyui.settings"
title = "Settings"

[app.shell]
use_window_menu_bar = false
use_tab_bar = false
use_status_bar = false
lazy_panel_loading = true

[app.window]
window_kind = "tool"
presentation = "native"
restore_state_scope = "TinyUI.Settings"
eyebrow = "SETTINGS"
subtitle = "Review host and plugin settings in one place and apply changes when you are ready."
default_width = 960
default_height = 620
min_width = 680
min_height = 420

[[app.buttons]]
button_id = "revert"
label = "Revert"
role = "secondary"

[[app.buttons]]
button_id = "save"
label = "Save"
role = "primary"

[[app.buttons]]
button_id = "close"
label = "Close"
role = "secondary"
